# Local development services (TRD §10). `docker compose -f infra/docker-compose.dev.yml up -d`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: algolens-postgres
    environment:
      POSTGRES_USER: algolens
      POSTGRES_PASSWORD: algolens
      POSTGRES_DB: algolens
    ports:
      - "5432:5432"
    volumes:
      - algolens-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algolens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: algolens-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - algolens-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  algolens-pg:
  algolens-redis:
